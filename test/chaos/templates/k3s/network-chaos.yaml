apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos

metadata:
  name: {{NAME}}

spec:
  action: {{ACTION}}
  mode: {{MODE}}

  selector:
    namespaces:
      - default

    labelSelectors:
      app: {{K8S_LABEL}}

  delay:
    latency: "{{LATENCY}}ms"
    jitter: "{{JITTER}}ms"

  loss:
    loss: "{{LOSS}}%"

  duration: "{{DURATION}}s"